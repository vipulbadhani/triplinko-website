<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triplinko — Smarter Carpooling</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%231A5CFF'/%3E%3Cstop offset='100%25' stop-color='%2300C9A0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M10 44 Q32 24 54 44' stroke='rgba(255,255,255,0.35)' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3Crect x='21' y='28' width='22' height='13' rx='4' fill='white'/%3E%3Cpath d='M25 28 L27 20 L37 20 L39 28 Z' fill='white'/%3E%3Ccircle cx='27' cy='41' r='4.5' fill='%230A2050'/%3E%3Ccircle cx='27' cy='41' r='2' fill='white'/%3E%3Ccircle cx='37' cy='41' r='4.5' fill='%230A2050'/%3E%3Ccircle cx='37' cy='41' r='2' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #F0F5FF;
    color: #0D1B3E;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(160deg, #EEF4FF 0%, #F7F0FF 50%, #E8FBF7 100%);
  }
  .blob {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.5;
  }
  .blob1 { width:500px; height:500px; background:#C7D9FF; top:-100px; left:-80px; animation: b1 20s ease-in-out infinite; }
  .blob2 { width:400px; height:400px; background:#CCF7EE; bottom:-80px; right:-60px; animation: b2 25s ease-in-out infinite; }
  .blob3 { width:300px; height:300px; background:#DDD0FF; top:40%; left:55%; animation: b3 18s ease-in-out infinite; }

  @keyframes b1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes b2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-20px)} }
  @keyframes b3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 24px 80px;
    text-align: center;
  }

  .logo-area {
    margin-bottom: 36px;
    opacity: 0; animation: up 0.7s 0.1s ease forwards;
  }
  .logo-icon {
    width: 88px; height: 88px;
    background: linear-gradient(135deg, #1A5CFF, #00C9A0);
    border-radius: 26px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 12px 40px rgba(26,92,255,0.3), 0 0 0 1px rgba(26,92,255,0.15);
  }
  .logo-name {
    font-family: 'Syne', sans-serif;
    font-size: 30px; font-weight: 800;
    color: #0D1B3E;
    letter-spacing: -0.5px;
  }
  .logo-name span { color: #1A5CFF; }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: white;
    border: 1.5px solid #D6E4FF;
    border-radius: 100px;
    padding: 8px 18px;
    font-size: 12px; font-weight: 600;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: #1A5CFF;
    margin-bottom: 28px;
    box-shadow: 0 2px 12px rgba(26,92,255,0.1);
    opacity: 0; animation: up 0.7s 0.25s ease forwards;
  }
  .badge-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #00C9A0;
    animation: pulse 1.6s ease-in-out infinite;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(42px, 8vw, 80px);
    font-weight: 800;
    line-height: 1.06;
    letter-spacing: -2.5px;
    color: #0D1B3E;
    margin-bottom: 22px;
    opacity: 0; animation: up 0.7s 0.35s ease forwards;
  }
  h1 .accent {
    background: linear-gradient(135deg, #1A5CFF 0%, #00C9A0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    font-size: clamp(15px, 2.5vw, 18px);
    font-weight: 400;
    color: #4A5878;
    max-width: 460px;
    line-height: 1.75;
    margin-bottom: 44px;
    opacity: 0; animation: up 0.7s 0.45s ease forwards;
  }

  .form-wrap {
    width: 100%; max-width: 460px;
    margin-bottom: 56px;
    opacity: 0; animation: up 0.7s 0.55s ease forwards;
  }
  .form-box {
    display: flex; gap: 0;
    background: white;
    border: 1.5px solid #D6E4FF;
    border-radius: 18px;
    padding: 6px 6px 6px 20px;
    box-shadow: 0 4px 24px rgba(26,92,255,0.08);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .form-box:focus-within {
    border-color: #1A5CFF;
    box-shadow: 0 4px 24px rgba(26,92,255,0.18);
  }
  .form-box input {
    flex: 1; border: none; outline: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px; font-weight: 400;
    color: #0D1B3E; background: transparent;
    padding: 10px 0;
  }
  .form-box input::placeholder { color: #9BAAC5; }
  .form-btn {
    background: linear-gradient(135deg, #1A5CFF, #0040CC);
    border: none; border-radius: 13px;
    padding: 13px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    color: white; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }
  .form-btn:hover { transform: scale(1.03); box-shadow: 0 8px 24px rgba(26,92,255,0.4); }
  .form-btn:active { transform: scale(0.97); }

  .form-note { margin-top: 12px; font-size: 12.5px; color: #8A9BBB; font-weight: 500; }

  .success {
    display: none; margin-top: 14px;
    background: #E6FBF5; border: 1.5px solid #00C9A0;
    border-radius: 12px; padding: 12px 18px;
    font-size: 14px; font-weight: 600; color: #007A60;
  }

  .pills {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    max-width: 600px; margin-bottom: 44px;
    opacity: 0; animation: up 0.7s 0.65s ease forwards;
  }
  .pill {
    display: flex; align-items: center; gap: 9px;
    background: white; border: 2px solid #C8D8FF;
    border-radius: 100px; padding: 12px 22px;
    font-size: 15px; font-weight: 700; color: #1A2E5A;
    box-shadow: 0 4px 16px rgba(26,92,255,0.12);
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; cursor: default;
    letter-spacing: -0.1px;
  }
  .pill .pi { font-size: 20px; }
  .pill:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(26,92,255,0.18);
    border-color: #1A5CFF;
    color: #1A5CFF;
  }

  footer {
    position: fixed; bottom: 20px; width: 100%; text-align: center;
    font-size: 12px; color: #9BAAC5; font-weight: 500;
  }

  .car { position: fixed; font-size: 22px; opacity: 0.12; pointer-events: none; animation: drive linear infinite; }
  .c1 { bottom: 18%; animation-duration: 28s; animation-delay: 0s; }
  .c2 { bottom: 40%; animation-duration: 40s; animation-delay: -15s; font-size: 16px; }
  .c3 { bottom: 65%; animation-duration: 50s; animation-delay: -30s; font-size: 14px; }

  @keyframes drive { from{left:-60px} to{left:calc(100vw + 60px)} }
  @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.75)} }

  /* Store section */
  .store-section {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    opacity: 0; animation: up 0.7s 0.75s ease forwards;
  }
  .store-label {
    font-size: 13px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: #8A9BBB;
    margin-bottom: -8px;
  }
  .store-btns {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  .store-btn {
    display: flex; align-items: center; gap: 14px;
    background: #0D1B3E;
    border: 2px solid #1A2E5A;
    border-radius: 18px;
    padding: 14px 28px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    min-width: 200px;
    box-shadow: 0 4px 20px rgba(13,27,62,0.15);
  }
  .store-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(13,27,62,0.25);
    border-color: #1A5CFF;
  }
  .store-text {
    display: flex; flex-direction: column; gap: 1px;
  }
  .store-sub {
    font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.6);
    letter-spacing: 0.3px;
  }
  .store-name {
    font-family: 'Syne', sans-serif;
    font-size: 19px; font-weight: 700; color: white;
    letter-spacing: -0.3px; line-height: 1.1;
  }
  .countries-row {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center;
    margin-top: 8px;
  }
  .countries-lbl { font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#8A9BBB; }
  .flags { display:flex; gap:10px; }
  .flag { font-size:24px; transition:transform 0.2s; cursor:default; }
  .flag:hover { transform:scale(1.25) rotate(-5deg); }

  @media(max-width:480px){
    .store-btn { min-width: 160px; padding: 12px 20px; }
    .store-name { font-size: 16px; }
  }
  @media(max-width:480px){
    .form-box { flex-direction:column; padding:12px; gap:10px; }
    .form-btn { width:100%; padding:15px; text-align:center; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="car c1">🚗</div>
<div class="car c2">🏍️</div>
<div class="car c3">🚙</div>

<div class="page">

  <div class="logo-area">
    <div class="logo-icon">
      <svg width="72" height="72" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="cg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF"/>
            <stop offset="100%" style="stop-color:#E8F4FF"/>
          </linearGradient>
          <filter id="sh">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0A0F1E" flood-opacity="0.25"/>
          </filter>
        </defs>
        <path d="M 80 360 Q 256 180 432 360" stroke="rgba(255,255,255,0.3)" stroke-width="22" fill="none" stroke-linecap="round"/>
        <path d="M 156 308 Q 216 248 256 234" stroke="rgba(255,255,255,0.18)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="20 16"/>
        <path d="M 256 234 Q 296 220 358 272" stroke="rgba(255,255,255,0.18)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="20 16"/>
        <rect x="168" y="220" width="176" height="100" rx="22" fill="url(#cg)" filter="url(#sh)"/>
        <path d="M 196 220 L 210 148 L 302 148 L 316 220 Z" fill="url(#cg)" filter="url(#sh)"/>
        <path d="M 302 220 L 292 160 L 266 160 L 266 220 Z" fill="#1B6FEB" opacity="0.85"/>
        <path d="M 210 220 L 214 160 L 246 160 L 246 220 Z" fill="#1B6FEB" opacity="0.85"/>
        <line x1="256" y1="155" x2="256" y2="220" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
        <rect x="148" y="238" width="20" height="12" rx="4" fill="white" opacity="0.6"/>
        <rect x="344" y="238" width="20" height="12" rx="4" fill="white" opacity="0.6"/>
        <circle cx="214" cy="322" r="34" fill="#0A2050"/>
        <circle cx="214" cy="322" r="20" fill="#1B3070"/>
        <circle cx="214" cy="322" r="10" fill="rgba(255,255,255,0.9)"/>
        <line x1="214" y1="302" x2="214" y2="342" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
        <line x1="194" y1="322" x2="234" y2="322" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
        <circle cx="298" cy="322" r="34" fill="#0A2050"/>
        <circle cx="298" cy="322" r="20" fill="#1B3070"/>
        <circle cx="298" cy="322" r="10" fill="rgba(255,255,255,0.9)"/>
        <line x1="298" y1="302" x2="298" y2="342" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
        <line x1="278" y1="322" x2="318" y2="322" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
        <ellipse cx="344" cy="280" rx="12" ry="8" fill="#FFD700" opacity="0.9"/>
        <ellipse cx="344" cy="280" rx="7" ry="5" fill="#FFF"/>
        <ellipse cx="168" cy="280" rx="10" ry="7" fill="#FF4444" opacity="0.8"/>
        <line x1="80" y1="245" x2="130" y2="245" stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round"/>
        <line x1="68" y1="268" x2="125" y2="268" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
        <circle cx="360" cy="115" r="22" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
        <circle cx="360" cy="110" r="9" fill="white" opacity="0.95"/>
        <path d="M 360 119 L 353 133 L 360 131 L 367 133 Z" fill="white" opacity="0.95"/>
        <circle cx="152" cy="115" r="22" fill="rgba(0,212,170,0.25)" stroke="rgba(0,212,170,0.6)" stroke-width="2"/>
        <circle cx="152" cy="110" r="9" fill="#00D4AA" opacity="0.95"/>
        <path d="M 152 119 L 145 133 L 152 131 L 159 133 Z" fill="#00D4AA" opacity="0.95"/>
        <line x1="174" y1="115" x2="338" y2="115" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="10 8"/>
      </svg>
    </div>
    <div class="logo-name"><span id="logoMain"></span><span id="logoAccent"></span></div>
  </div>

  <div class="badge"><div class="badge-dot"></div><span id="badgeText"></span></div>

  <h1><span id="headingMain"></span><br><span class="accent" id="headingAccent"></span></h1>

  <p class="sub" id="description"></p>

  <div class="form-wrap">
    <form id="waitlist-form" action="https://api.web3forms.com/submit" method="POST" onsubmit="handleForm(event)">
      <div class="form-box">
        <input type="hidden" name="access_key" id="accessKey">
        <input type="email" name="email" id="em" required />
        <button type="submit" class="form-btn" id="submit-btn"></button>
      </div>
    </form>
    <p class="form-note" id="formNote"></p>
    <div class="success" id="ok"></div>
  </div>

  <div class="pills" id="pillsContainer"></div>

  <div class="store-section">
    <p class="store-label" id="storeLabel"></p>
    <div class="store-btns" id="storeBtnsContainer"></div>

    <div class="countries-row">
      <span class="countries-lbl" id="countriesLabel"></span>
      <div class="flags" id="flagsContainer"></div>
    </div>
  </div>

</div>

<footer id="footer"></footer>

<script>
  let pageData = {};

  async function loadData() {
    try {
      const response = await fetch('./data.json');
      pageData = await response.json();
      populateContent();
    } catch (error) {
      console.error('Error loading data:', error);
    }
  }

  function populateContent() {
    document.title = pageData.branding.pageTitle;
    document.getElementById('logoMain').textContent = pageData.branding.logoName;
    const logoAccent = document.getElementById('logoAccent');
    logoAccent.textContent = pageData.branding.logoNameAccent;
    logoAccent.style.color = '#1A5CFF';

    document.getElementById('badgeText').textContent = pageData.hero.badge;
    document.getElementById('headingMain').textContent = pageData.hero.heading;
    document.getElementById('headingAccent').textContent = pageData.hero.headingAccent;
    document.getElementById('description').textContent = pageData.hero.description;

    document.getElementById('accessKey').value = pageData.formApi.accessKey;
    document.getElementById('em').placeholder = pageData.form.inputPlaceholder;
    document.getElementById('submit-btn').textContent = pageData.form.buttonText;
    document.getElementById('formNote').textContent = pageData.form.noteText;
    document.getElementById('ok').textContent = pageData.form.successMessage;

    const pillsContainer = document.getElementById('pillsContainer');
    pillsContainer.innerHTML = '';
    pageData.features.forEach(feature => {
      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.innerHTML = `<span class="pi">${feature.icon}</span> ${feature.text}`;
      pillsContainer.appendChild(pill);
    });

    document.getElementById('storeLabel').textContent = pageData.stores.label;
    const storeBtnsContainer = document.getElementById('storeBtnsContainer');
    storeBtnsContainer.innerHTML = '';
    pageData.stores.items.forEach(item => {
      const storeBtn = document.createElement('div');
      storeBtn.className = 'store-btn';
      storeBtn.innerHTML = `
        <svg width="32" height="32" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gp1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#00C3FF"/>
              <stop offset="100%" style="stop-color:#1BE8FF"/>
            </linearGradient>
            <linearGradient id="gp2" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#FFD945"/>
              <stop offset="100%" style="stop-color:#FF9B00"/>
            </linearGradient>
            <linearGradient id="gp3" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#FF3A44"/>
              <stop offset="100%" style="stop-color:#C31162"/>
            </linearGradient>
            <linearGradient id="gp4" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#32A071"/>
              <stop offset="100%" style="stop-color:#00F076"/>
            </linearGradient>
          </defs>
          <path d="M48 30 L280 256 L48 482 C36 475 28 463 28 448 L28 64 C28 49 36 37 48 30Z" fill="url(#gp1)"/>
          <path d="M348 188 L280 256 L48 30 C60 23 75 24 88 32 Z" fill="url(#gp4)"/>
          <path d="M348 324 L88 480 C75 488 60 489 48 482 L280 256 Z" fill="url(#gp3)"/>
          <path d="M484 234 C496 241 496 271 484 278 L348 324 L272 256 L348 188 Z" fill="url(#gp2)"/>
        </svg>
        <div class="store-text">
          <span class="store-sub">${item.subtitle}</span>
          <span class="store-name">${item.name}</span>
        </div>
      `;
      storeBtnsContainer.appendChild(storeBtn);
    });

    document.getElementById('countriesLabel').textContent = pageData.countries.label;
    const flagsContainer = document.getElementById('flagsContainer');
    flagsContainer.innerHTML = '';
    pageData.countries.items.forEach(country => {
      const flag = document.createElement('span');
      flag.className = 'flag';
      flag.title = country.name;
      flag.textContent = country.flag;
      flagsContainer.appendChild(flag);
    });

    document.getElementById('footer').textContent = pageData.footer;
  }

  async function handleForm(event) {
    event.preventDefault();

    const em = document.getElementById('em');
    const ok = document.getElementById('ok');
    const btn = document.getElementById('submit-btn');

    ok.removeAttribute('style');
    ok.style.display = 'none';

    if (!em.value.trim() || !em.value.includes('@') || !em.value.includes('.')) {
      em.style.outline = '2px solid #FF4D4D';
      em.focus();
      setTimeout(() => em.style.outline = 'none', 2000);
      return;
    }

    btn.textContent = 'Submitting…';
    btn.disabled = true;
    btn.style.opacity = '0.7';

    try {
      const payload = {
        access_key: pageData.formApi.accessKey,
        email: em.value.trim(),
        subject: pageData.formApi.subject,
        from_name: pageData.formApi.fromName,
      };

      const response = await fetch(pageData.formApi.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (result.success) {
        ok.style.display = 'block';
        em.value = '';
        em.placeholder = "You're in! 🎉";
        em.disabled = true;
        btn.textContent = 'Done ✓';
        btn.style.opacity = '0.5';
      } else {
        ok.style.cssText = 'display:block; background:#FFF0F0; border:1.5px solid #FF4D4D; color:#CC0000;';
        ok.textContent = '⚠️ ' + (result.message || 'Something went wrong. Please try again.');
        btn.textContent = pageData.form.buttonText;
        btn.disabled = false;
        btn.style.opacity = '1';
      }
    } catch (err) {
      ok.style.cssText = 'display:block; background:#FFF0F0; border:1.5px solid #FF4D4D; color:#CC0000;';
      ok.textContent = '⚠️ Network error. Please check your connection.';
      btn.textContent = pageData.form.buttonText;
      btn.disabled = false;
      btn.style.opacity = '1';
    }
  }

  document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
